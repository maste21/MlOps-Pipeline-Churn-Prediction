services:

* type: web
  name: churn-fastapi
  env: docker
  plan: free
  dockerfilePath: ./Dockerfile
  startCommand: uvicorn src.inference.fastapi_app:app --host 0.0.0.0 --port 10000
  autoDeploy: true

* type: web
  name: churn-streamlit
  env: docker
  plan: free
  dockerfilePath: ./Dockerfile
  startCommand: streamlit run src/inference/app.py --server.port 10001 --server.address 0.0.0.0
  autoDeploy: true
