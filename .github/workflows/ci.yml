name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # Checkout
      # ---------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------------------------------------------------
      # Python Setup
      # ---------------------------------------------------

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ---------------------------------------------------
      # Install Dependencies
      # ---------------------------------------------------

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # ---------------------------------------------------
      # Docker Build Check
      # ---------------------------------------------------

      - name: Build Docker containers
        run: docker compose build

      # ---------------------------------------------------
      # Formatting Checks
      # ---------------------------------------------------

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Check import order with isort
        run: isort --check-only src/ tests/

      - name: Lint with pylint
        run: |
          pylint src/ tests/ --disable=all --enable=E,F

      # ---------------------------------------------------
      # Unit Tests
      # ---------------------------------------------------

      - name: Run tests
        run: pytest

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage report

      - name: Run tests with coverage report
        run: |
          pytest --cov=src --cov-report=term --cov-report=xml

      # ---------------------------------------------------
      # Docker Compose Startup Test
      # ---------------------------------------------------

      - name: Start Docker services
        run: |
          docker compose up -d
          sleep 40

      - name: Check running containers
        run: docker ps

      # ---------------------------------------------------
      # FastAPI Smoke Test
      # ---------------------------------------------------

      - name: Wait for FastAPI startup
        run: |
          for i in {1..20}; do
            if curl -f http://127.0.0.1:8000/health; then
              echo "FastAPI is ready"
              exit 0
            fi
            echo "Waiting for FastAPI..."
            sleep 10
          done

          echo "FastAPI failed to start"
          docker compose logs
          exit 1

      - name: Test FastAPI health endpoint
        run: |
          curl -f http://127.0.0.1:8000/health

      # ---------------------------------------------------
      # Streamlit Smoke Test
      # ---------------------------------------------------

      - name: Wait for Streamlit startup
        run: |
          for i in {1..20}; do
            if curl -f http://127.0.0.1:8501; then
              echo "Streamlit is ready"
              exit 0
            fi
            echo "Waiting for Streamlit..."
            sleep 10
          done

          echo "Streamlit failed to start"
          docker compose logs
          exit 1

      - name: Check Streamlit app
        run: |
          curl -f http://127.0.0.1:8501

      # ---------------------------------------------------
      # Coverage Badge
      # ---------------------------------------------------

      - name: Generate coverage badge
        run: |
          mkdir -p badges
          coverage-badge -o badges/coverage.svg -f

      - name: Upload badge as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: badges/coverage.svg

      # ---------------------------------------------------
      # GitHub Actions Git Config
      # ---------------------------------------------------

      - name: Setup Git for GitHub Actions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      # ---------------------------------------------------
      # Commit Coverage Badge
      # ---------------------------------------------------

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git add badges/coverage.svg
          git commit -m "Update coverage badge [skip ci]" || echo "No changes to commit"
          git push